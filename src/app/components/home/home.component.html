<section class="hero">
  <!-- Left Side -->
  <div class="left">
    <h1>Hi, I’m <span class="accent">{{name}}</span></h1>
    <p class="tagline">{{tagline}}</p>
    <p class="intro">
      I build robust tools and apps — virtual file systems, backup utilities, and user authentication systems. I enjoy clean code and pragmatic solutions.
    </p>

    <!-- Hero CTA buttons -->
    <div class="hero-cta">
      <a routerLink="/projects" class="btn primary">See Projects</a>
      <a routerLink="/contact" class="btn secondary">Contact Me</a>
    </div>

    <!-- Contact Section -->
    <div class="contact-mobile">
      <!-- Phone -->
      <div class="contact-item">
        <img src="assets/icons/mobile.svg" alt="Mobile" class="mobile-icon" />
        <span class="label">Call Us On</span>
        <a [href]="'tel:' + phoneNumber" class="contact-link">{{ phoneNumber }}</a>
      </div>

      <!-- Email -->
      <div class="contact-item">
        <img src="assets/icons/email.svg" alt="Email" class="mobile-icon" />
        <span class="label">Email Us</span>
        <a [href]="'mailto:' + email" class="contact-link">{{ email }}</a>
      </div>
    </div>
  </div>

  <!-- Right Side (Profile Image) -->
  <div class="right">
    <img src="assets/profile.jpg" 
         alt="Profile photo of Tejas" 
         class="profile" 
         loading="lazy">
  </div>
</section>
