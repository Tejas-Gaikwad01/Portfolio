name: Deploy Angular App

on:
  push:
    branches:
      - main

permissions:
  contents: write   # ✅ REQUIRED for deployment

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4   # ✅ updated
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build -- --base-href /Portfolio/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4   # ✅ updated
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/my-portfolio